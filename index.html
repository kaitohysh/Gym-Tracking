  #view{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(18px + var(--safe-bottom));}

  header.top{display:flex;align-items:center;gap:12px;flex:0 0 auto;padding:calc(16px + var(--safe-top)) 0 12px;}
  header.top .logo{font-family:'Archivo Black';font-size:24px;letter-spacing:-0.04em;}
  header.top .logo span{color:var(--accent);}
  .back{font-size:24px;font-weight:800;color:var(--text);padding:2px 6px;line-height:1;}
  .grow{flex:1;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .muted{color:var(--muted);}
  .empty{text-align:center;color:var(--muted);padding:44px 16px;font-weight:600;line-height:1.6;}
  .empty .big{font-size:40px;margin-bottom:8px;}
  .section-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:18px 2px 12px;}
  .divider{height:1px;background:var(--line);margin:20px 2px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);
    color:#0a0a0b;font-weight:700;padding:14px 18px;border-radius:14px;font-size:15px;width:100%;transition:transform .1s;}
  .btn:active{transform:scale(.97);}
  .btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line);}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:11px;}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--line);}
  .row{display:flex;align-items:center;gap:10px;}
  .between{justify-content:space-between;}

  .list-item{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;transition:.15s;}
  .list-item:active{background:var(--surface-2);}
  .list-item .title{font-weight:700;font-size:17px;}
  .list-item .sub{font-size:13px;color:var(--muted);margin-top:3px;font-weight:600;}
  .chev{color:var(--muted);font-size:20px;}

  /* ---- the table ---- */
  .rtitle{font-family:'Archivo Black';font-size:24px;letter-spacing:-.03em;margin-bottom:2px;}
  .rmeta{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:14px;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);
    border-radius:14px;background:var(--surface);}
  table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;}
  th,td{padding:0;vertical-align:middle;}
  .sticky-col{position:sticky;left:0;z-index:2;background:var(--surface);
    width:150px;min-width:150px;max-width:150px;border-right:2px solid var(--line);}
  thead .sticky-col{z-index:4;background:var(--surface-2);}
  thead th{position:sticky;top:0;z-index:1;background:var(--surface-2);
    border-bottom:1px solid var(--line);padding:9px 6px;text-align:center;
    font-size:12px;font-weight:700;color:var(--muted);min-width:96px;}
  thead th.today{color:var(--accent);}
  thead .corner{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;text-align:left;padding:9px 12px;}
  .dayhead{position:relative;}
  .dayhead .wd{display:block;font-size:10px;opacity:.7;}
  .dayhead .dd{display:block;font-size:13px;color:var(--text);font-weight:700;}
  .dayhead.today .dd{color:var(--accent);}
  .dayhead .del{position:absolute;top:2px;right:3px;font-size:11px;color:var(--muted);
    padding:2px 4px;line-height:1;display:none;}
  .editing .dayhead .del{display:block;}
  .editing .dayhead{cursor:pointer;}
  .dayhead .edhint{display:none;font-size:9px;color:var(--accent-dim);font-weight:700;margin-top:2px;}
  .editing .dayhead .edhint{display:block;}

  .grouprow td{background:transparent;}
  .grouphead{position:sticky;left:0;z-index:2;background:linear-gradient(var(--surface),var(--surface));
    border-right:2px solid var(--line);border-top:1px solid var(--line);
    padding:9px 12px;font-family:'Archivo Black';font-size:12px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--accent);}
  .groupfill{border-top:1px solid var(--line);background:rgba(214,249,59,.03);}

  .exrow td{border-top:1px solid var(--line);}
  .excell{padding:10px 12px;}
  .excell .exname{font-weight:700;font-size:15px;line-height:1.2;}
  .excell .exmeta{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px;}
  .daycell{padding:8px 6px;border-left:1px solid var(--line);cursor:pointer;vertical-align:top;}
  .daycell:active{background:var(--surface-2);}
  .setlist{display:flex;flex-direction:column;gap:2px;}
  .setline{font-size:14px;font-weight:700;text-align:center;color:var(--text);white-space:nowrap;}
  .setline span{color:var(--muted);font-weight:600;}
  .setadd{font-size:18px;font-weight:700;color:var(--accent-dim);text-align:center;}
  /* focused "log today" session */
  .sgroup{font-family:'Archivo Black';font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);margin:16px 2px 8px;}
  .excard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 12px 8px;margin-bottom:10px;}
  .exhead .exn{font-weight:700;font-size:16px;}
  .exhead .ext{font-size:12px;color:var(--muted);font-weight:600;margin:2px 0 9px;}
  .setrow{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .setno{flex:0 0 20px;font-size:13px;font-weight:700;color:var(--muted);text-align:center;}
  .si{flex:1 1 0;min-width:0;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    font-size:17px;font-weight:700;text-align:center;padding:12px 6px;border-radius:11px;}
  .si:focus{outline:none;border-color:var(--accent-dim);}
  .si::placeholder{color:#55555c;font-weight:600;font-size:14px;}
  .x2{flex:0 0 auto;color:var(--muted);font-weight:700;}
  .setdel{flex:0 0 28px;color:var(--danger);font-size:15px;font-weight:700;padding:6px 2px;}
  .addset{font-size:13px;font-weight:700;color:var(--accent);padding:5px 2px 3px;}
  .bstat{font-size:12px;font-weight:700;color:var(--muted);margin:2px 2px 10px;}
  .bstat.warn{color:#f5c451;}
  .score{font-size:11px;font-weight:800;color:var(--accent-dim);text-align:center;margin-top:4px;min-height:13px;letter-spacing:.01em;}
  .score.pr{color:var(--accent);}
  .seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px;}
  .seg button{flex:1;padding:9px 0;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted);}
  .seg button.on{background:var(--accent);color:#0a0a0b;}

  .exselect{position:relative;margin:2px 0 16px;}
  .exselect select{width:100%;-webkit-appearance:none;appearance:none;background:var(--surface-2);
    border:1px solid var(--line);color:var(--text);font-family:inherit;font-weight:700;font-size:16px;
    padding:14px 40px 14px 14px;border-radius:12px;}
  .exselect select:focus{outline:none;border-color:var(--accent-dim);}
  .exselect::after{content:'▾';position:absolute;right:15px;top:50%;transform:translateY(-50%);
    color:var(--accent);font-size:14px;pointer-events:none;}
  .stats{display:flex;gap:10px;margin-bottom:14px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;}
  .stat .sl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
  .stat .sv{font-family:'Archivo Black';font-size:23px;letter-spacing:-.02em;}
  .stat .sv span{font-size:12px;font-family:'Archivo';color:var(--muted);margin-left:2px;}
  .stat .sv.up{color:var(--accent);}
  .stat .sv.down{color:var(--danger);}
  .chart{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 12px 8px;margin-bottom:12px;}

  .editbtn{font-size:13px;font-weight:700;color:var(--muted);padding:8px 12px;
    border:1px solid var(--line);border-radius:11px;}
  .editbtn.on{color:#0a0a0b;background:var(--accent);border-color:var(--accent);}

  /* plan editor */
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .field input{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);font-size:16px;font-weight:600;padding:13px 14px;border-radius:12px;}
  .field input:focus{outline:none;border-color:var(--accent-dim);}
  .planrow{display:grid;grid-template-columns:1fr 1.2fr 44px 84px 24px;gap:6px;align-items:center;margin-bottom:7px;}
  .planrow input{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    font-size:14px;font-weight:600;padding:10px 7px;border-radius:9px;}
  .planrow input.c{text-align:center;}
  .rng{display:flex;align-items:center;gap:3px;}
  .rng input{min-width:0;text-align:center;padding:10px 2px;}
  .rng .dash{flex:0 0 auto;color:var(--muted);font-weight:700;font-size:13px;}
  .planrow .x{color:var(--danger);font-size:20px;font-weight:700;text-align:center;}
  .planhead{display:grid;grid-template-columns:1fr 1.2fr 44px 84px 24px;gap:6px;
    font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;padding:0 4px;}
  .addrow{font-size:13px;font-weight:700;color:var(--accent);padding:8px 2px 2px;}

  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;animation:fade .2s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--surface);width:100%;max-width:760px;margin:0 auto;border-radius:22px 22px 0 0;
    padding:22px 18px calc(22px + var(--safe-bottom));max-height:90vh;overflow-y:auto;border-top:1px solid var(--line);
    animation:slideup .28s cubic-bezier(.2,.8,.2,1);}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet h2{font-size:22px;margin-bottom:18px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:40px;background:var(--text);color:var(--bg);
    font-weight:700;font-size:14px;padding:11px 18px;border-radius:999px;z-index:200;opacity:0;transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <header class="top" id="topbar"></header>
  <div id="view"></div>
</div>
<div class="sheet-bg" id="sheetBg"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<datalist id="muscles">
  <option>Chest</option><option>Upper Chest</option><option>Shoulders</option>
  <option>Side Delts</option><option>Rear Delts</option><option>Triceps</option>
  <option>Biceps</option><option>Forearms</option><option>Back</option>
  <option>Lats</option><option>Traps</option><option>Lower Back</option>
  <option>Quads</option><option>Hamstrings</option><option>Glutes</option>
  <option>Calves</option><option>Adductors</option><option>Abs</option>
  <option>Obliques</option><option>Core</option>
</datalist>

<script>
const KEY='lift_data_v2';
let data={routines:[]};
let screen={name:'home',rid:null,editing:false};

function normalize(d){
  if(!d||typeof d!=='object'||!Array.isArray(d.routines))return {routines:[]};
  const out={routines:[]};
  if(d.unit==='kg'||d.unit==='lb')out.unit=d.unit;
  if(d.lastBackup&&Number(d.lastBackup))out.lastBackup=Number(d.lastBackup);
  d.routines.forEach(r=>{
    if(!r||typeof r!=='object')return;
    const rows=Array.isArray(r.rows)?r.rows.filter(x=>x&&typeof x==='object').map(x=>({
      id:x.id||uid(),muscle:x.muscle||'',exercise:x.exercise||'',
      sets:x.sets==null?'':String(x.sets),target:x.target==null?'':String(x.target)})):[];
    const days=Array.isArray(r.days)?r.days.filter(x=>x&&x.id).map(x=>({
      id:x.id,ts:Number(x.ts)||Date.now()})):[];
    const log=(r.log&&typeof r.log==='object')?r.log:{};
    out.routines.push({id:r.id||uid(),name:r.name||'Untitled',rows,days,log});
  });
  return out;
}
function load(){try{const r=localStorage.getItem(KEY);if(r)data=normalize(JSON.parse(r));}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){toast('Could not save — storage blocked');}}
const uid=()=>Math.random().toString(36).slice(2,9);
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDay(ts){const d=new Date(ts);return{wd:d.toLocaleDateString(undefined,{weekday:'short'}),
  dd:d.toLocaleDateString(undefined,{day:'numeric',month:'short'})};}
function isToday(ts){const a=new Date(ts),b=new Date();return a.toDateString()===b.toDateString();}

/* estimated 1-rep-max — Epley: w*(1+reps/30); reps<=1 returns the weight */
function e1rm(w,reps){if(!(w>0)||!(reps>0))return 0;return reps<=1?w:w*(1+reps/30);}
/* parse a cell (weight/reps may be single or multi like "60,60,57.5" / "8,8,7"); score = best set */
function cellScore(cell){
  if(!cell)return null;
  const ws=String(cell.w).split(/[^0-9.]+/).map(parseFloat).filter(x=>x>0);
  const rs=String(cell.r).split(/[^0-9.]+/).map(parseFloat).filter(x=>x>0);
  if(!ws.length||!rs.length)return null;
  let best=0;
  for(let i=0;i<rs.length;i++){const w=ws[Math.min(i,ws.length-1)];const v=e1rm(w,rs[i]);if(v>best)best=v;}
  return best>0?best:null;
}
function scoreLabel(cell){const s=cellScore(cell);return s?('1RM '+Math.round(s)):'';}
function cellVolume(cell){
  if(!cell)return null;
  const ws=String(cell.w).split(/[^0-9.]+/).map(parseFloat).filter(x=>x>0);
  const rs=String(cell.r).split(/[^0-9.]+/).map(parseFloat).filter(x=>x>0);
  if(!ws.length||!rs.length)return null;
  let v=0;for(let i=0;i<rs.length;i++){v+=ws[Math.min(i,ws.length-1)]*rs[i];}
  return v>0?v:null;
}
function unit(){return data.unit||'kg';}
function setUnit(u){data.unit=u;save();render();}
function fmtNum(n){return Math.round(n).toLocaleString();}
function exKey(name){return String(name==null?'':name).trim().toLowerCase();}
/* all-time PR: a day stars when it beats the best of every EARLIER session of the
   same exercise (matched by name) across ALL routines — not just this one */
function prMap(r,rowId){
  const row=(r.rows||[]).find(x=>x.id===rowId);if(!row)return {};
  const key=exKey(row.exercise);const all=[];
  data.routines.forEach(rr=>{
    const ids=(rr.rows||[]).filter(x=>exKey(x.exercise)===key).map(x=>x.id);
    if(!ids.length)return;
    (rr.days||[]).forEach(d=>{ids.forEach(id=>{const s=cellScore(rr.log[id]&&rr.log[id][d.id]);
      if(s!=null)all.push({ts:d.ts,score:s,here:(rr.id===r.id&&id===rowId),dayId:d.id});});});
  });
  all.sort((a,b)=>a.ts-b.ts||((a.here?1:0)-(b.here?1:0)));
  const m={};let best=null;
  all.forEach(p=>{if(p.here&&best!=null&&p.score>best+1e-9)m[p.dayId]=true;
    best=best==null?p.score:Math.max(best,p.score);});
  return m;
}

function go(name,rid){screen={name,rid:rid||null,editing:false};render();}

/* Replace #view content safely. On iOS, swapping innerHTML while a momentum
   (flick) scroll is still gliding leaves WebKit in a broken state — so we
   first force any in-flight scroll to stop, then swap. */
function setView(html){
  const v=document.getElementById('view');
  if(!v){return;}
  v.querySelectorAll('.table-wrap,.pills').forEach(el=>{
    el.style.webkitOverflowScrolling='auto';
    el.style.overflow='hidden';
  });
  v.style.overflowY='hidden';
  v.scrollTop=0; v.scrollLeft=0;
  void v.offsetHeight;            // reflow commits the stop
  v.innerHTML=html;
  v.style.overflowY='';           // restore (stylesheet: auto)
}

/* ---------------- render ---------------- */
function render(){
  const tb=document.getElementById('topbar');
  if(screen.name==='home'){
    tb.innerHTML=`<div class="logo">LIFT<span>.</span></div><div class="grow"></div>`;
    setView(renderHome());
    return;
  }
  let back=`go('home')`;
  if(screen.name==='progress')back=screen.rid?`go('routine','${screen.rid}')`:`go('home')`;
  else if(screen.name==='session')back=`go('routine','${screen.rid}')`;
  tb.innerHTML=`<button class="back" onclick="${back}">‹</button><div class="logo">LIFT<span>.</span></div>`;
  if(screen.name==='progress'){
    setView(renderProgress(screen.rid));
  }else if(screen.name==='session'){
    setView(renderSession(screen.rid,screen.dayId));
  }else{
    setView(renderRoutine(screen.rid));
    // jump to the latest (right-most) column so today is in view
    const w=document.querySelector('.table-wrap');if(w)w.scrollLeft=w.scrollWidth;
  }
}

function renderHome(){
  let h='';
  const lb=data.lastBackup;
  const bdays=lb?Math.floor((Date.now()-lb)/864e5):null;
  const bwarn=data.routines.length&&(lb==null||bdays>=7);
  const bstat=lb?('Last backup: '+(bdays<=0?'today':bdays===1?'yesterday':bdays+' days ago')):'⚠ No backup yet';
  if(!data.routines.length){
    h+=`<div class="empty"><div class="big">🏋️</div>No routines yet.<br>Create your first one below.</div>`;
  }else{
    h+=`<div class="section-label">Your routines</div>`;
    data.routines.forEach(r=>{
      const days=r.days.length;
      h+=`<div class="list-item" onclick="go('routine','${r.id}')">
        <div><div class="title">${esc(r.name)}</div>
        <div class="sub">${r.rows.length} exercises · ${days} day${days!==1?'s':''} logged</div></div>
        <div class="chev">›</div></div>`;
    });
    h+=`<div style="height:6px"></div>
      <button class="btn ghost" onclick="go('progress')">📈 Progress &amp; 1RM graphs</button>`;
  }
  h+=`<div style="height:8px"></div><button class="btn" onclick="editPlan()">+ New routine</button>
    <div class="divider"></div><div class="section-label">Units</div>
    <div class="seg">
      <button class="${unit()==='kg'?'on':''}" onclick="setUnit('kg')">kg</button>
      <button class="${unit()==='lb'?'on':''}" onclick="setUnit('lb')">lb</button>
    </div>
    <p class="muted" style="font-size:12px;line-height:1.5;margin:-6px 0 4px">Just a label — switching won't convert numbers you've already entered.</p>
    <div class="section-label">Backup</div>
    <p class="bstat ${bwarn?'warn':''}">${bstat}</p>
    <div class="row" style="gap:10px">
      <button class="btn ghost sm grow" onclick="exportData()">Export data</button>
      <button class="btn ghost sm grow" onclick="document.getElementById('importFile').click()">Import data</button>
    </div>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
    <p class="muted" style="font-size:12px;line-height:1.6;margin-top:10px">
      Data lives only on this phone. Export a backup now and then — clearing your browser data would wipe it.</p>`;
  return h;
}

function groupRows(rows){
  const order=[],map={};
  rows.forEach(r=>{const m=(r.muscle||'Other').trim()||'Other';
    if(!map[m]){map[m]=[];order.push(m);}map[m].push(r);});
  return order.map(m=>({muscle:m,rows:map[m]}));
}

/* ---- per-set helpers (a logged cell stores comma-joined sets: w "80,82.5" r "8,7") ---- */
function cellSets(cell){
  if(!cell)return [];
  const ws=String(cell.w==null?'':cell.w).split(',').map(s=>s.trim());
  const rs=String(cell.r==null?'':cell.r).split(',').map(s=>s.trim());
  const n=Math.max(ws.length,rs.length);const out=[];
  for(let i=0;i<n;i++){const w=ws[Math.min(i,ws.length-1)]||'';const r=rs[i]||'';
    if(w!==''||r!=='')out.push({w,r});}
  return out;
}
function setsToCell(sets){
  const u=(sets||[]).filter(s=>String(s.w||'').trim()!==''||String(s.r||'').trim()!=='');
  return {w:u.map(s=>String(s.w||'').trim()).join(','),r:u.map(s=>String(s.r||'').trim()).join(',')};
}
function plannedSets(row){const n=parseInt(row.sets,10);return n>0?n:2;}
function lastSets(r,rowId,dayId){
  const cur=r.days.find(d=>d.id===dayId);const ts=cur?cur.ts:Infinity;
  const prior=r.days.filter(d=>d.ts<ts&&cellSets(r.log[rowId]&&r.log[rowId][d.id]).length).sort((a,b)=>a.ts-b.ts);
  return prior.length?cellSets(r.log[rowId][prior[prior.length-1].id]):[];
}

/* focused logging session */
let sess=null;
function logToday(rid){
  const r=data.routines.find(x=>x.id===rid);if(!r)return;
  let d=r.days.find(x=>isToday(x.ts));
  if(!d){d={id:uid(),ts:Date.now()};r.days.push(d);r.days.sort((a,b)=>a.ts-b.ts);save();}
  openSession(rid,d.id);
}
function openSession(rid,dayId){
  const r=data.routines.find(x=>x.id===rid);if(!r)return;
  const d=r.days.find(x=>x.id===dayId);if(!d)return;
  sess={rid,dayId,rows:{}};
  r.rows.forEach(row=>{
    const ex=cellSets(r.log[row.id]&&r.log[row.id][dayId]);
    if(ex.length)sess.rows[row.id]=ex.map(s=>({w:s.w,r:s.r}));
    else{const n=Math.max(1,lastSets(r,row.id,dayId).length||plannedSets(row));
      sess.rows[row.id]=Array.from({length:n},()=>({w:'',r:''}));}
  });
  screen={name:'session',rid,dayId,editing:false};render();
}
function sessChange(rowId,i,field,val){const a=sess&&sess.rows[rowId];if(!a||!a[i])return;a[i][field]=val;commitSess(rowId);}
function commitSess(rowId){
  const r=data.routines.find(x=>x.id===sess.rid);if(!r)return;
  if(!r.log[rowId])r.log[rowId]={};
  const cell=setsToCell(sess.rows[rowId]);
  if(cell.w||cell.r)r.log[rowId][sess.dayId]=cell;else if(r.log[rowId])delete r.log[rowId][sess.dayId];
  save();
}
function sessAddSet(rowId){if(!sess)return;(sess.rows[rowId]=sess.rows[rowId]||[]).push({w:'',r:''});commitSess(rowId);refreshSession();}
function sessRmSet(rowId,i){if(!sess||!sess.rows[rowId])return;sess.rows[rowId].splice(i,1);commitSess(rowId);refreshSession();}
function refreshSession(){const v=document.getElementById('view');if(!v||!sess)return;const top=v.scrollTop;v.innerHTML=renderSession(sess.rid,sess.dayId);v.scrollTop=top;}
function renderSession(rid,dayId){
  const r=data.routines.find(x=>x.id===rid);if(!r)return'';
  const d=r.days.find(x=>x.id===dayId);
  const dl=d?new Date(d.ts).toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'short'}):'';
  let h=`<div class="rtitle">${esc(r.name)}</div><div class="rmeta">${esc(dl)}</div>`;
  if(!r.rows.length){h+=`<div class="empty"><div class="big">📋</div>No exercises in this routine yet.</div>
    <button class="btn" onclick="editPlan('${rid}')">Edit plan</button>`;return h;}
  groupRows(r.rows).forEach(g=>{
    h+=`<div class="sgroup">${esc(g.muscle)}</div>`;
    g.rows.forEach(row=>{
      const sets=(sess&&sess.rows[row.id])||[];const last=lastSets(r,row.id,dayId);
      h+=`<div class="excard"><div class="exhead"><div class="exn">${esc(row.exercise)}</div>
        <div class="ext">${esc(row.target||'—')} reps${last.length?` · last: ${last.map(s=>esc(s.w)+'×'+esc(s.r)).join(', ')}`:''}</div></div>`;
      sets.forEach((s,i)=>{const ph=last[i]||{};
        h+=`<div class="setrow"><div class="setno">${i+1}</div>
          <input class="si" inputmode="decimal" placeholder="${ph.w?esc(ph.w):esc(unit())}" value="${esc(s.w)}" oninput="sessChange('${row.id}',${i},'w',this.value)">
          <span class="x2">×</span>
          <input class="si" inputmode="numeric" placeholder="${ph.r?esc(ph.r):'reps'}" value="${esc(s.r)}" oninput="sessChange('${row.id}',${i},'r',this.value)">
          <button class="setdel" onclick="sessRmSet('${row.id}',${i})">✕</button></div>`;});
      h+=`<button class="addset" onclick="sessAddSet('${row.id}')">+ Add set</button></div>`;
    });
  });
  h+=`<div style="height:12px"></div><button class="btn" onclick="go('routine','${rid}')">Done</button>`;
  return h;
}

function renderRoutine(rid){
  const r=data.routines.find(x=>x.id===rid);if(!r)return'';
  let h=`<div class="row between" style="align-items:flex-start;margin-bottom:4px">
      <div><div class="rtitle">${esc(r.name)}</div>
      <div class="rmeta">${r.rows.length} exercises · ${r.days.length} workout days</div></div>
      <button class="editbtn ${screen.editing?'on':''}" onclick="toggleEdit()">${screen.editing?'Done':'Edit'}</button>
    </div>`;

  if(!r.rows.length){
    h+=`<div class="empty"><div class="big">📋</div>No exercises yet.<br>Tap "Edit plan" to add some.</div>
      <button class="btn" onclick="editPlan('${r.id}')">Edit plan</button>`;
    return h;
  }

  const colspan=1+r.days.length;
  h+=`<div class="table-wrap ${screen.editing?'editing':''}"><table><thead><tr>
      <th class="sticky-col corner">Exercise</th>`;
  r.days.forEach(d=>{const f=fmtDay(d.ts);const t=isToday(d.ts)?'today':'';
    h+=`<th class="dayhead ${t}" ${screen.editing?`onclick="editDay('${r.id}','${d.id}')"`:''}>
      <span class="wd">${f.wd}</span><span class="dd">${f.dd}</span>${screen.editing?'<span class="edhint">edit ✎</span>':''}</th>`;});
  if(!r.days.length) h+=`<th class="dayhead muted" style="font-weight:600">No days yet</th>`;
  h+=`</tr></thead><tbody>`;

  groupRows(r.rows).forEach(g=>{
    h+=`<tr class="grouprow"><td class="grouphead">${esc(g.muscle)}</td>
        <td class="groupfill" colspan="${Math.max(1,r.days.length)}"></td></tr>`;
    g.rows.forEach(row=>{
      h+=`<tr class="exrow"><td class="sticky-col excell">
          <div class="exname">${esc(row.exercise)}</div>
          <div class="exmeta">${esc(row.sets||'?')} sets · ${esc(row.target||'—')} reps</div></td>`;
      const prs=prMap(r,row.id);
      if(!r.days.length){h+=`<td class="daycell muted" style="text-align:center;font-size:12px;cursor:default">—</td>`;}
      r.days.forEach(d=>{
        const cell=r.log[row.id]&&r.log[row.id][d.id];const sets=cellSets(cell);
        const t=isToday(d.ts)?'today':'';const lbl=scoreLabel(cell);const isPR=prs[d.id]&&lbl;
        const inner=sets.length
          ? `<div class="setlist">${sets.map(s=>`<div class="setline">${esc(s.w||'–')}<span>×${esc(s.r||'–')}</span></div>`).join('')}</div><div class="score ${isPR?'pr':''}">${isPR?'⭐ ':''}${lbl}</div>`
          : `<div class="setadd">＋</div>`;
        h+=`<td class="daycell ${t}" onclick="openSession('${r.id}','${d.id}')">${inner}</td>`;
      });
      h+=`</tr>`;
    });
  });
  h+=`</tbody></table></div>
    <div style="height:14px"></div>
    <button class="btn" onclick="logToday('${r.id}')">＋ Log today's session</button>
    <div style="height:8px"></div>
    <button class="btn ghost" onclick="go('progress','${r.id}')">📈 Progress &amp; 1RM graph</button>
    <div style="height:8px"></div>
    <button class="btn ghost" onclick="editPlan('${r.id}')">Edit plan</button>
    <p class="muted" style="font-size:12px;line-height:1.6;margin-top:12px">Tap any cell to log or edit that day's sets.</p>`;
  return h;
}

function toggleEdit(){screen.editing=!screen.editing;render();}

/* ---------------- progress + graph ---------------- */
/* every exercise across ALL routines, deduped by name, grouped by muscle */
function allGroups(){
  const order=[],gmap={};
  data.routines.forEach(r=>{(r.rows||[]).forEach(x=>{
    const key=exKey(x.exercise);if(!key)return;
    const muscle=(x.muscle||'Other').trim()||'Other';
    if(!gmap[muscle]){gmap[muscle]={muscle,ex:{},order:[]};order.push(muscle);}
    const g=gmap[muscle];
    if(!g.ex[key]){g.ex[key]={name:String(x.exercise).trim(),key};g.order.push(key);}
  });});
  return order.map(m=>({muscle:m,rows:gmap[m].order.map(k=>gmap[m].ex[k])}));
}
/* all (ts,score) points for an exercise NAME across every routine, merged by
   calendar day (1RM: best set of the day; Volume: summed) */
function gatherPoints(name,metricFn,isVol){
  const key=exKey(name),byDay={};
  data.routines.forEach(r=>{
    const ids=(r.rows||[]).filter(x=>exKey(x.exercise)===key).map(x=>x.id);
    if(!ids.length)return;
    (r.days||[]).forEach(d=>{
      let day=null;
      ids.forEach(id=>{const s=metricFn(r.log[id]&&r.log[id][d.id]);
        if(s!=null)day=day==null?s:(isVol?day+s:Math.max(day,s));});
      if(day!=null){const k=new Date(d.ts);k.setHours(12,0,0,0);const dk=k.getTime();
        byDay[dk]=byDay[dk]==null?day:(isVol?byDay[dk]+day:Math.max(byDay[dk],day));}
    });
  });
  return Object.keys(byDay).map(k=>({ts:Number(k),score:byDay[k]})).sort((a,b)=>a.ts-b.ts);
}
function selExKey(key){
  const g=allGroups().find(x=>x.rows.some(r=>r.key===key));
  if(g)screen.muscle=g.muscle;
  screen.exKey=key;
  setView(renderProgress(screen.rid));
}
function renderProgress(rid){
  const groups=allGroups();
  if(!groups.length)return `<div class="empty"><div class="big">📈</div>Add exercises first to track progress.</div>`;
  // resolve the selected exercise (by name-key) across every group
  let cur=null,curMuscle=null;
  groups.forEach(g=>g.rows.forEach(x=>{if(x.key===screen.exKey){cur=x;curMuscle=g.muscle;}}));
  if(!cur){cur=groups[0].rows[0];curMuscle=groups[0].muscle;}
  screen.exKey=cur.key;screen.muscle=curMuscle;
  const metric=screen.metric||'1rm';
  let h=`<div class="rtitle">Progress</div><div class="rmeta">${esc(cur.name)} · ${metric==='vol'?'training volume':'estimated 1-rep-max'} · all workouts combined</div>
    <div class="seg">
      <button class="${metric==='1rm'?'on':''}" onclick="setMetric('1rm')">Est. 1RM</button>
      <button class="${metric==='vol'?'on':''}" onclick="setMetric('vol')">Volume</button>
    </div>
    <div class="exselect"><select onchange="selExKey(this.value)" aria-label="Choose exercise">`;
  groups.forEach(g=>{
    h+=`<optgroup label="${esc(g.muscle)}">`;
    g.rows.forEach(x=>{h+=`<option value="${esc(x.key)}" ${x.key===screen.exKey?'selected':''}>${esc(x.name)}</option>`;});
    h+=`</optgroup>`;
  });
  h+=`</select></div>`;
  const fn=metric==='vol'?cellVolume:cellScore;
  const pts=gatherPoints(cur.name,fn,metric==='vol');
  if(!pts.length){h+=`<div class="empty"><div class="big">🗓️</div>No sets logged for this exercise yet.<br>Fill in some weights & reps to see the curve.</div>`;return h;}
  const u=unit();
  const curv=pts[pts.length-1].score,pr=Math.max(...pts.map(p=>p.score)),first=pts[0].score,delta=curv-first;
  h+=`<div class="stats">
    <div class="stat"><div class="sl">Current</div><div class="sv">${fmtNum(curv)}<span>${u}</span></div></div>
    <div class="stat"><div class="sl">Best</div><div class="sv">${fmtNum(pr)}<span>${u}</span></div></div>
    <div class="stat"><div class="sl">Since start</div><div class="sv ${delta>=0?'up':'down'}">${delta>=0?'+':''}${fmtNum(delta)}<span>${u}</span></div></div>
  </div>
  <div class="chart">${lineChart(pts,u)}</div>
  <p class="muted" style="font-size:12px;line-height:1.6;margin-top:4px">
    ${metric==='vol'?'Volume = total weight moved per day (Σ weight × reps), combined across every workout.':'Estimated 1RM (Epley: weight × (1 + reps ÷ 30)), best set per day, combined across every workout.'}</p>`;
  return h;
}
function setMetric(m){screen.metric=m;setView(renderProgress(screen.rid));}
function lineChart(pts,u){
  const W=320,H=190,pad=30;
  const xs=pts.map((_,i)=>pts.length>1?pad+i*(W-2*pad)/(pts.length-1):W/2);
  const vals=pts.map(p=>p.score);
  let mn=Math.min(...vals),mx=Math.max(...vals);
  if(mn===mx){mn-=5;mx+=5;}else{const p=(mx-mn)*0.15;mn-=p;mx+=p;}
  const y=v=>H-pad-(v-mn)/(mx-mn)*(H-2*pad);
  const ys=vals.map(y);
  const poly=xs.map((x,i)=>`${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const dots=xs.map((x,i)=>`<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3.6" fill="#d6f93b"/>`).join('');
  const area=`${xs[0].toFixed(1)},${(H-pad)} ${poly} ${xs[xs.length-1].toFixed(1)},${(H-pad)}`;
  const f=ts=>new Date(ts).toLocaleDateString(undefined,{day:'numeric',month:'short'});
  const grid=[0,.5,1].map(t=>{const yy=(H-pad)-t*(H-2*pad);return `<line x1="${pad}" y1="${yy.toFixed(1)}" x2="${W-pad}" y2="${yy.toFixed(1)}" stroke="#2a2a2e" stroke-width="1"/>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
    ${grid}
    ${pts.length>1?`<polygon points="${area}" fill="rgba(214,249,59,.08)" stroke="none"/>`:''}
    ${pts.length>1?`<polyline points="${poly}" fill="none" stroke="#d6f93b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`:''}
    ${dots}
    <text x="${pad}" y="16" fill="#8a8a92" font-size="11" font-weight="700">${fmtNum(mx)}${u||'kg'}</text>
    <text x="${pad}" y="${H-pad+18}" fill="#8a8a92" font-size="10">${f(pts[0].ts)}</text>
    <text x="${W-pad}" y="${H-pad+18}" fill="#8a8a92" font-size="10" text-anchor="end">${f(pts[pts.length-1].ts)}</text>
  </svg>`;
}

/* ---------------- day logging ---------------- */
function delDay(rid,dayId){
  const r=data.routines.find(x=>x.id===rid);if(!r)return;
  confirmDo('Delete this day and the sets logged in it?',()=>{
    r.days=r.days.filter(d=>d.id!==dayId);
    Object.keys(r.log).forEach(k=>{if(r.log[k])delete r.log[k][dayId];});
    save();render();
  });
}
function toDateInput(ts){const d=new Date(ts);const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function editDay(rid,dayId){
  const r=data.routines.find(x=>x.id===rid);if(!r)return;
  const d=r.days.find(x=>x.id===dayId);if(!d)return;
  openSheet(`<h2>Edit day</h2>
    <div class="field"><label>Date</label>
      <input type="date" id="dayDate" value="${toDateInput(d.ts)}"></div>
    <button class="btn" onclick="saveDayDate('${rid}','${dayId}')">Save date</button>
    <div style="height:8px"></div>
    <button class="btn danger" onclick="delDay('${rid}','${dayId}')">Delete this day</button>`);
}
function saveDayDate(rid,dayId){
  const r=data.routines.find(x=>x.id===rid);if(!r)return;
  const d=r.days.find(x=>x.id===dayId);if(!d)return;
  const v=document.getElementById('dayDate').value;
  if(v){const a=v.split('-').map(Number);d.ts=new Date(a[0],a[1]-1,a[2],12,0,0).getTime();}
  r.days.sort((x,y)=>x.ts-y.ts);
  save();closeSheet();render();toast('Date updated');
}

/* ---------------- plan editor ---------------- */
let draft=null;
function editPlan(rid){
  draft = rid ? JSON.parse(JSON.stringify(data.routines.find(r=>r.id===rid)))
              : {id:uid(),name:'',rows:[{id:uid(),muscle:'',exercise:'',sets:'2',target:'8-12'}],days:[],log:{}};
  draft._isNew=!rid;
  renderEditor();
}
function renderEditor(){
  let h=`<h2>${draft._isNew?'New routine':'Edit plan'}</h2>
    <div class="field"><label>Routine name</label>
      <input id="rName" placeholder="e.g. Push Day" value="${esc(draft.name)}" oninput="draft.name=this.value" autocomplete="off"></div>
    <div class="planhead"><div>Muscle</div><div>Exercise</div><div>Sets</div><div>Target</div><div></div></div>
    <div id="planRows">`;
  draft.rows.forEach((row,i)=>{
    const tp=String(row.target||'').split('-');
    const tlo=esc((tp[0]||'').trim()),thi=esc((tp[1]||'').trim());
    h+=`<div class="planrow">
      <input list="muscles" placeholder="Chest" value="${esc(row.muscle)}" oninput="draft.rows[${i}].muscle=this.value" autocomplete="off">
      <input placeholder="Bench Press" value="${esc(row.exercise)}" oninput="draft.rows[${i}].exercise=this.value" autocomplete="off">
      <input class="c" inputmode="numeric" placeholder="4" value="${esc(row.sets)}" oninput="draft.rows[${i}].sets=this.value">
      <div class="rng">
        <input class="c" inputmode="numeric" placeholder="8" id="t_lo_${i}" value="${tlo}" oninput="setTarget(${i})">
        <span class="dash">–</span>
        <input class="c" inputmode="numeric" placeholder="12" id="t_hi_${i}" value="${thi}" oninput="setTarget(${i})">
      </div>
      <button class="x" onclick="rmRow(${i})">×</button></div>`;
  });
  h+=`</div><div class="addrow" onclick="addRow()">+ Add exercise</div>
    <div style="height:18px"></div>
    <button class="btn" onclick="savePlan()">Save</button>`;
  if(!draft._isNew)h+=`<div style="height:8px"></div><button class="btn danger" onclick="delRoutine('${draft.id}')">Delete routine</button>`;
  openSheet(h);
}
function addRow(){draft.rows.push({id:uid(),muscle:'',exercise:'',sets:'2',target:'8-12'});renderEditor();}
function rmRow(i){draft.rows.splice(i,1);renderEditor();}
function setTarget(i){
  const g=id=>((document.getElementById(id)||{}).value||'').replace(/[^0-9]/g,'');
  const lo=g('t_lo_'+i),hi=g('t_hi_'+i);
  draft.rows[i].target=[lo,hi].filter(x=>x!=='').join('-');
}
function savePlan(){
  draft.name=(draft.name||'').trim()||'Untitled';
  draft.rows=draft.rows.filter(r=>r.exercise.trim());
  if(!draft.log)draft.log={};
  const clean={id:draft.id,name:draft.name,rows:draft.rows,days:draft.days||[],log:draft.log};
  const idx=data.routines.findIndex(r=>r.id===draft.id);
  if(idx>=0)data.routines[idx]=clean;else data.routines.push(clean);
  save();closeSheet();
  if(screen.name==='home')go('routine',clean.id);else render();
  toast('Saved');
}
function delRoutine(id){
  confirmDo('Delete this routine and all its logged data?',()=>{
    data.routines=data.routines.filter(r=>r.id!==id);save();go('home');
  });
}

/* ---------------- backup ---------------- */
function exportData(){
  data.lastBackup=Date.now();save();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`lift-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();toast('Backup downloaded');
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);if(d&&Array.isArray(d.routines)){data=normalize(d);save();go('home');toast('Data imported');}
    else toast('Not a valid backup');}catch(e){toast('Could not read file');}};
  rd.readAsText(f);
}

/* ---------------- sheet ---------------- */
function openSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('sheetBg').style.display='flex';}
function closeSheet(){document.getElementById('sheetBg').style.display='none';}
document.getElementById('sheetBg').addEventListener('click',e=>{if(e.target.id==='sheetBg')closeSheet();});

/* custom confirm — native confirm() is blocked in sandboxed previews */
let _pendingYes=null;
function confirmDo(msg,onYes){
  _pendingYes=onYes;
  openSheet(`<h2>Are you sure?</h2>
    <p class="muted" style="font-size:15px;line-height:1.6;margin:-6px 0 20px">${esc(msg)}</p>
    <button class="btn" style="background:var(--danger);color:#fff" onclick="confirmYes()">Delete</button>
    <div style="height:8px"></div>
    <button class="btn ghost" onclick="closeSheet()">Cancel</button>`);
}
function confirmYes(){const fn=_pendingYes;_pendingYes=null;closeSheet();if(fn)fn();}

load();render();
</script>
